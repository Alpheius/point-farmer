<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Points Farmer</title>
</head>
<body>
    <p id="pointsFarmed">0 Points</p>
    <p id="clickUpgrades">0 Boosters</p>
    <p id="collisionsMade">0 Collisions</p>
    <button onclick="farmPoints()">Farm Point</button>
    <button id="clickUpgradesButton" onclick="buyClickUpgrade()">Buy Booster (costs 10 Points)</button>
    <br>
    <p id="momentum">Total Momentum: 0</p>
    <p id="kineticEnergy">"Total Kinetic Energy (kE): 0</p>
    <canvas id="box" width="1000" height="1000" style="border:1px solid #000000;"></canvas>
    <br>
    <p id="speed">Current Speed: 1x</p>
    <input type="range" id="inputSpeed" max="2" step="0.25">
    <br>
    <input type="number" id="inputGravity">
    <button id="setGravity" onclick="setGravity()">Set Gravity Constant (Currently: 1)</button>
    <br>
    <input type="number" id="inputElasticity">
    <button id="setElasticity" onclick="setElasticity()">Set Elasticity (Currently: 1)</button>
    <br>
    <input type="number" id="inputFriction">
    <button id="setFriction" onclick="setFriction()">Set Friction (Currently: 0.99)</button>
    <br>
    <button id="makeCircle" onclick="createBallFromInputs()">Create Ball</button><br>
    <input type="number" id="inputX">
    <input type="number" id="inputY">
    <input type="number" id="inputR"><br>
    <input type="number" id="inputVX">
    <input type="number" id="inputVY">
    <input type="number" id="inputDensity">
    <script src="main.js" charset="UTF-8" type="text/javascript"></script>
</body>
</html>
